name: "Push Playit Binary to Cachix"
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "flake.lock"
      - "packages/playit.nix"

jobs:
  upload-cachix:
    runs-on: ubuntu-latest
    steps:
      - name: Setup job
        uses: pedorich-n/github-workflows/.github/actions/setup-nix-job@394fb5dff4f8ee88f7fec2c55bb178875af055c5 # main

      - uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
        with:
          name: playit-nixos-module
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Build and push to Cachix
        run: nix build .#playit --accept-flake-config --print-out-paths
